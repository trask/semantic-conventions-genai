name: PR dashboard

on:
  schedule:
    # hourly
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-dashboard:
    if: github.repository == 'open-telemetry/semantic-conventions-genai'
    permissions:
      issues: write
    environment: protected
    runs-on: ubuntu-latest
    env:
      DASHBOARD_TITLE: "Pull Request Dashboard"
      DASHBOARD_LABEL: "dashboard"
      DASHBOARD_OUTPUT: pull-request-dashboard.md
      DASHBOARD_PREVIOUS: previous-pull-request-dashboard.md
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Install Copilot CLI
        run: |
          npm ci --prefix .github/scripts/copilot-cli
          # expose the locally-installed `copilot` binary to subsequent steps
          echo "$GITHUB_WORKSPACE/.github/scripts/copilot-cli/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Fetch existing dashboard issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          number=$(gh api \
            --paginate \
            "repos/$GITHUB_REPOSITORY/issues?state=open&labels=$DASHBOARD_LABEL&per_page=100" \
            --jq '.[] | select(.pull_request == null and .title == env.DASHBOARD_TITLE) | .number' \
            | sort -n \
            | sed -n '1p')

          echo "DASHBOARD_ISSUE_NUMBER=$number" >> "$GITHUB_ENV"

          if [[ -n "$number" ]]; then
            gh issue view "$number" --json body --jq .body > "$DASHBOARD_PREVIOUS"
          else
            : > "$DASHBOARD_PREVIOUS"
          fi

      - name: Generate dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # needed for reading approver team membership (org:read)
          OTELBOT_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_MAP_JSON: ${{ secrets.SLACK_USER_MAP_JSON }}
        run: |
          python3 .github/scripts/pull-request-dashboard.py \
            --output "$DASHBOARD_OUTPUT" \
            --previous-dashboard "$DASHBOARD_PREVIOUS" \
            --slack-notify-approver-waiting

      - name: Update or create dashboard issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -n "${DASHBOARD_ISSUE_NUMBER:-}" ]]; then
            echo "Updating existing issue #$DASHBOARD_ISSUE_NUMBER"
            gh issue edit "$DASHBOARD_ISSUE_NUMBER" --body-file "$DASHBOARD_OUTPUT"
          else
            echo "Creating new dashboard issue"
            gh issue create \
              --title "$DASHBOARD_TITLE" \
              --label "$DASHBOARD_LABEL" \
              --body-file "$DASHBOARD_OUTPUT"
          fi
