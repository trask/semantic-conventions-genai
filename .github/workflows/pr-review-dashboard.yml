name: PR dashboard

on:
  schedule:
    # hourly
    - cron: "0 * * * *"
  workflow_dispatch:
  pull_request_target:
    types:
      - assigned
      - closed
      - converted_to_draft
      - edited
      - opened
      - ready_for_review
      - reopened
      - synchronize
      - unassigned
  issue_comment:
    types: [created, edited, deleted]
  # pull_request_review and pull_request_review_comment cannot be triggered
  # directly here: they are loaded from the PR head SHA and would prompt
  # the protected environment's required reviewer on every fork-PR run.
  # Instead, the unprivileged "PR dashboard listener" workflow forwards
  # those events as a small validated artifact and we pick it up via
  # workflow_run, which runs from the default branch context.
  workflow_run:
    workflows: ["PR dashboard listener"]
    types: [completed]

concurrency:
  # Per-PR groups serialize a single PR's own burst of events (push +
  # review + comment within seconds) so they can't race on the per-PR
  # classification cache or the state slot for that PR. Different PRs
  # run concurrently; the CAS retry loop on the state-branch push
  # handles the cross-PR race.
  #
  # The expression is evaluated before any step runs, so we can only
  # read raw event payload fields. We key by PR number for direct PR
  # events and by `workflow_run.head_sha` for review events forwarded
  # by the listener (reviews on the same PR share a head SHA until the
  # next push, so they group together). Cron and manual dispatch fall
  # through to `shared`.
  group: >-
    ${{ github.workflow }}-${{
      github.event.pull_request.number
      || github.event.issue.number
      || github.event.workflow_run.head_sha
      || 'shared'
    }}
  # Let an in-flight run complete while a burst coalesces into one
  # queued follow-up, rather than `true`'s "keep cancelling and never
  # finish" behaviour during a burst.
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-dashboard:
    if: >-
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
      &&
      (github.event_name != 'issue_comment' || github.event.issue.pull_request)
    # The two parenthesized clauses above:
    #   1. workflow_run fires for any terminal listener state; skip non-success
    #      so a failed listener doesn't show up here as a failed dashboard run.
    #   2. issue_comment fires for both issues and PRs; skip non-PR comments.
    permissions:
      actions: read
      checks: read
      contents: read
      issues: write
      pull-requests: read
    environment: protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Resolve trigger
        id: trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_FROM_PR_TARGET: ${{ github.event.pull_request.number }}
          PR_FROM_ISSUE: ${{ github.event.issue.number }}
          ACTION_FROM_PAYLOAD: ${{ github.event.action }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_number=""
          trigger_event=""
          trigger_action=""
          case "$EVENT_NAME" in
            pull_request_target)
              pr_number="$PR_FROM_PR_TARGET"
              trigger_event="$EVENT_NAME"
              trigger_action="$ACTION_FROM_PAYLOAD"
              ;;
            issue_comment)
              pr_number="$PR_FROM_ISSUE"
              trigger_event="$EVENT_NAME"
              trigger_action="$ACTION_FROM_PAYLOAD"
              ;;
            workflow_run)
              # The listener encodes the trigger payload in the artifact
              # name as: trigger__<event>__<action>
              # We only need the artifact's *name*, not its contents.
              name="$(gh api \
                "repos/$GITHUB_REPOSITORY/actions/runs/$WORKFLOW_RUN_ID/artifacts" \
                --jq '.artifacts[] | select(.name | startswith("trigger__")) | .name' \
                | head -n1)"
              if [[ -z "$name" ]]; then
                echo "no trigger__ artifact found on listener run $WORKFLOW_RUN_ID" >&2
                exit 1
              fi
              rest="${name#trigger__}"
              trigger_event="${rest%__*}"
              trigger_action="${rest##*__}"

              pr_number="$(gh api -X GET search/issues \
                -f q="repo:$GITHUB_REPOSITORY is:pr $WORKFLOW_RUN_HEAD_SHA" \
                --jq '.items[0].number // empty')"
              if [[ -z "$pr_number" ]]; then
                echo "no PR found for head_sha $WORKFLOW_RUN_HEAD_SHA" >&2
                exit 1
              fi
              ;;
          esac

          # Re-validate every value before exporting. For workflow_run this
          # is the trust boundary between the unprivileged listener and the
          # privileged consumer; for the other events it is defence in
          # depth against unexpected payload shapes.
          if [[ -n "$pr_number" ]]; then
            [[ "$pr_number" =~ ^[1-9][0-9]{0,6}$ ]] \
              || { echo "bad PR number: $pr_number"; exit 1; }
          fi
          if [[ -n "$trigger_event" ]]; then
            [[ "$trigger_event" =~ ^(pull_request_target|pull_request_review|pull_request_review_comment|issue_comment)$ ]] \
              || { echo "bad event: $trigger_event"; exit 1; }
          fi
          if [[ -n "$trigger_action" ]]; then
            [[ "$trigger_action" =~ ^[a-z_]{1,32}$ ]] \
              || { echo "bad action: $trigger_action"; exit 1; }
          fi

          {
            echo "pr_number=$pr_number"
            echo "event=$trigger_event"
            echo "action=$trigger_action"
          } >> "$GITHUB_OUTPUT"

          # Echo the resolved trigger to the job log for at-a-glance diagnostics.
          echo "trigger: pr=${pr_number:--} event=${trigger_event:--} action=${trigger_action:--}"

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Restore per-PR classification cache
        # Scoped to one PR so concurrent PR events don't overwrite each
        # other's work. Cache entries are immutable, so the save key uses
        # a rolling suffix and restore-keys picks the most recent snapshot.
        if: steps.trigger.outputs.pr_number != ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/pr-classifications
          key: pr-classifications-${{ steps.trigger.outputs.pr_number }}-${{ github.run_id }}
          restore-keys: |
            pr-classifications-${{ steps.trigger.outputs.pr_number }}-

      - name: Restore shared full-rebuild classification cache
        # Single cache shared across the hourly schedule and manual full
        # rebuilds, so only the few PRs that changed since the last
        # rebuild pay the LLM cost. Same rolling-key pattern as above.
        if: steps.trigger.outputs.pr_number == ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/pr-classifications
          key: pr-classifications-all-${{ github.run_id }}
          restore-keys: |
            pr-classifications-all-

      - name: Checkout state branch
        # Cross-PR-correct state lives on an orphan branch
        # (otelbot/pull-request-dashboard-state) tracked in git. The branch has no
        # shared history with main and never triggers other workflows.
        # We check it out into ./state/ as a separate worktree so the
        # main checkout of `main` is untouched. `git push --force-with-lease`
        # later gives us a real atomic CAS via the git ref.
        env:
          STATE_BRANCH: otelbot/pull-request-dashboard-state
        run: |
          set -euo pipefail
          git config user.email "otelbot@users.noreply.github.com"
          git config user.name  "otelbot"
          git fetch origin "$STATE_BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$STATE_BRANCH"; then
            git worktree add state -B "$STATE_BRANCH" "origin/$STATE_BRANCH"
          else
            # First run: bootstrap an empty orphan branch.
            git worktree add --detach state HEAD
            git -C state switch --orphan "$STATE_BRANCH"
            git -C state rm -rf . 2>/dev/null || true
          fi

      - name: Install Copilot CLI
        run: |
          npm ci --prefix .github/scripts/copilot-cli
          # expose the locally-installed `copilot` binary to subsequent steps
          echo "$GITHUB_WORKSPACE/.github/scripts/copilot-cli/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Generate and update dashboard
        env:
          TRIGGER_PR_NUMBER: ${{ steps.trigger.outputs.pr_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # needed for reading approver team membership (org:read)
          OTELBOT_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_MAP_JSON: ${{ secrets.SLACK_USER_MAP_JSON }}
          STATE_BRANCH: otelbot/pull-request-dashboard-state
        run: |
          set -euo pipefail

          prior_state="$RUNNER_TEMP/prior-notification-state.json"
          args=(--state-dir state --prior-notification-state "$prior_state")
          if [[ -n "${TRIGGER_PR_NUMBER:-}" ]]; then
            args+=(--pr-number "$TRIGGER_PR_NUMBER")
          fi

          # State branch push uses --force-with-lease as a real CAS. On
          # rejection, refetch and rerun so the script sees the latest
          # base. Between attempts we snapshot the just-sent
          # notification state to $prior_state; the script union-merges
          # it into the freshly fetched state so the cadence gate
          # treats those pings as already-notified. The issue body
          # PATCH is itself idempotent via base_body CAS.
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            python3 .github/scripts/pull-request-dashboard.py "${args[@]}"

            git -C state add -A
            if git -C state diff --cached --quiet; then
              echo "no state changes to push"
              exit 0
            fi
            git -C state commit -m "Update dashboard state"

            # Snapshot the just-sent state before any potential reset.
            cp state/notification-state.json "$prior_state"

            if git -C state \
                -c "http.https://github.com/.extraheader=AUTHORIZATION: bearer ${OTELBOT_TOKEN}" \
                push --force-with-lease origin "$STATE_BRANCH"; then
              echo "state pushed on attempt $attempt"
              exit 0
            fi

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "CAS retry exhausted after $attempt attempt(s)" >&2
              exit 1
            fi

            echo "push rejected (attempt $attempt); refetching and retrying" >&2
            git -C state fetch origin "$STATE_BRANCH"
            git -C state reset --hard "origin/$STATE_BRANCH"
          done
