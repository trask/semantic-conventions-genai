name: PR dashboard

on:
  schedule:
    # hourly
    - cron: "0 * * * *"
  workflow_dispatch:
  pull_request_target:
    types:
      - assigned
      - closed
      - converted_to_draft
      - edited
      - opened
      - ready_for_review
      - reopened
      - synchronize
      - unassigned
  issue_comment:
    types: [created, edited, deleted]
  # pull_request_review and pull_request_review_comment cannot be triggered
  # directly here: they are loaded from the PR head SHA and would prompt
  # the protected environment's required reviewer on every fork-PR run.
  # Instead, the unprivileged "PR dashboard listener" workflow forwards
  # those events as a small validated artifact and we pick it up via
  # workflow_run, which runs from the default branch context.
  workflow_run:
    workflows: ["PR dashboard listener"]
    types: [completed]

permissions:
  contents: read

env:
  DASHBOARD_STATE_BRANCH: otelbot/pull-request-dashboard-state

jobs:
  resolve-trigger:
    if: >-
      github.repository == 'open-telemetry/semantic-conventions-genai'
      &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
      &&
      (github.event_name != 'issue_comment' || github.event.issue.pull_request)
    # The clauses above:
    #   1. only run the privileged dashboard workflow on the upstream repo.
    #   2. workflow_run fires for any terminal listener state; skip non-success
    #      so a failed listener doesn't show up here as a failed dashboard run.
    #   3. issue_comment fires for both issues and PRs; skip non-PR comments.
    permissions:
      actions: read
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      skip_dashboard: ${{ steps.trigger.outputs.skip_dashboard }}
      pr_number: ${{ steps.trigger.outputs.pr_number }}
    steps:
      - name: Resolve trigger
        id: trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_FROM_PR_TARGET: ${{ github.event.pull_request.number }}
          PR_FROM_ISSUE: ${{ github.event.issue.number }}
          ACTION_FROM_PAYLOAD: ${{ github.event.action }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_number=""
          trigger_event=""
          trigger_action=""
          skip_dashboard="false"

          skip_forwarded_event() {
            echo "$1" >&2
            skip_dashboard="true"
          }

          case "$EVENT_NAME" in
            pull_request_target)
              pr_number="$PR_FROM_PR_TARGET"
              trigger_event="$EVENT_NAME"
              trigger_action="$ACTION_FROM_PAYLOAD"
              ;;
            issue_comment)
              pr_number="$PR_FROM_ISSUE"
              trigger_event="$EVENT_NAME"
              trigger_action="$ACTION_FROM_PAYLOAD"
              ;;
            workflow_run)
              # The listener encodes the trigger payload in the artifact
              # name as: trigger__<event>__<action>
              # We only need the artifact's *name*, not its contents.
              name="$(gh api \
                "repos/$GITHUB_REPOSITORY/actions/runs/$WORKFLOW_RUN_ID/artifacts" \
                --jq '.artifacts[] | select(.name | startswith("trigger__")) | .name' \
                | head -n1)"
              if [[ -z "$name" ]]; then
                skip_forwarded_event "no trigger__ artifact found on listener run $WORKFLOW_RUN_ID; skipping stale forwarded event"
              else
                rest="${name#trigger__}"
                trigger_event="${rest%__*}"
                trigger_action="${rest##*__}"

                if [[ ! "$WORKFLOW_RUN_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]; then
                  skip_forwarded_event "bad head sha: $WORKFLOW_RUN_HEAD_SHA; skipping stale forwarded event"
                else
                  mapfile -t matching_pr_numbers < <(gh api \
                    "repos/$GITHUB_REPOSITORY/commits/$WORKFLOW_RUN_HEAD_SHA/pulls" \
                    --jq '.[] | select(.state == "open" and .head.sha == env.WORKFLOW_RUN_HEAD_SHA) | .number')
                  if [[ "${#matching_pr_numbers[@]}" -eq 0 ]]; then
                    skip_forwarded_event "no open PR found for head_sha $WORKFLOW_RUN_HEAD_SHA; skipping stale forwarded event"
                  elif [[ "${#matching_pr_numbers[@]}" -gt 1 ]]; then
                    skip_forwarded_event "multiple open PRs found for head_sha $WORKFLOW_RUN_HEAD_SHA; skipping ambiguous forwarded event"
                  else
                    pr_number="${matching_pr_numbers[0]}"
                  fi
                fi
              fi
              ;;
          esac

          # Re-validate every value before exporting. For workflow_run this
          # is the trust boundary between the unprivileged listener and the
          # privileged consumer; for the other events it is defence in
          # depth against unexpected payload shapes.
          if [[ -n "$pr_number" ]]; then
            [[ "$pr_number" =~ ^[1-9][0-9]{0,6}$ ]] \
              || { echo "bad PR number: $pr_number"; exit 1; }
          fi
          if [[ -n "$trigger_event" ]]; then
            [[ "$trigger_event" =~ ^(pull_request_target|pull_request_review|pull_request_review_comment|issue_comment)$ ]] \
              || { skip_forwarded_event "bad forwarded event: $trigger_event"; }
          fi
          if [[ -n "$trigger_action" ]]; then
            [[ "$trigger_action" =~ ^[a-z_]{1,32}$ ]] \
              || { skip_forwarded_event "bad forwarded action: $trigger_action"; }
          fi

          {
            echo "skip_dashboard=$skip_dashboard"
            echo "pr_number=$pr_number"
            echo "event=$trigger_event"
            echo "action=$trigger_action"
          } >> "$GITHUB_OUTPUT"

          # Echo the resolved trigger to the job log for at-a-glance diagnostics.
          echo "trigger: pr=${pr_number:--} event=${trigger_event:--} action=${trigger_action:--}"

  update-dashboard:
    needs: resolve-trigger
    if: needs.resolve-trigger.outputs.skip_dashboard != 'true'
    # Same-PR events are serialized together while unrelated PRs can update
    # state concurrently. Full rebuilds use their own lane. The state branch
    # push below still uses --force-with-lease as the durable CAS across lanes.
    concurrency:
      group: ${{ github.workflow }}-state-${{ github.repository }}-${{ needs.resolve-trigger.outputs.pr_number || 'full' }}
      cancel-in-progress: false
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    environment: protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Restore per-PR classification cache
        # Scoped to one PR so concurrent PR events don't overwrite each
        # other's work. Cache entries are immutable, so the save key uses
        # a rolling suffix and restore-keys picks the most recent snapshot.
        if: needs.resolve-trigger.outputs.pr_number != ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/pr-classifications
          key: pr-classifications-${{ needs.resolve-trigger.outputs.pr_number }}-${{ github.run_id }}
          restore-keys: |
            pr-classifications-${{ needs.resolve-trigger.outputs.pr_number }}-

      - name: Restore shared full-rebuild classification cache
        # Single cache shared across the hourly schedule and manual full
        # rebuilds, so only the few PRs that changed since the last
        # rebuild pay the LLM cost. Same rolling-key pattern as above.
        if: needs.resolve-trigger.outputs.pr_number == ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/pr-classifications
          key: pr-classifications-all-${{ github.run_id }}
          restore-keys: |
            pr-classifications-all-

      - name: Install Copilot CLI
        run: |
          npm ci --prefix .github/scripts/copilot-cli
          # expose the locally-installed `copilot` binary to subsequent steps
          echo "$GITHUB_WORKSPACE/.github/scripts/copilot-cli/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Generate and update dashboard
        env:
          TRIGGER_PR_NUMBER: ${{ needs.resolve-trigger.outputs.pr_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # needed for reading approver team membership (org:read)
          OTELBOT_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          dashboard_args=(--state-branch "$DASHBOARD_STATE_BRANCH")
          if [[ -n "${TRIGGER_PR_NUMBER:-}" ]]; then
            dashboard_args+=(--pr-number "$TRIGGER_PR_NUMBER")
          fi

          python3 .github/scripts/pull-request-dashboard/dashboard.py "${dashboard_args[@]}"

  notify-slack:
    needs: update-dashboard
    if: needs.update-dashboard.result == 'success'
    # Slack sends are external side effects, so serialize notification
    # processing while still allowing PR-specific dashboard computation to run
    # concurrently. The notification ledger is pushed with the same state-branch
    # CAS retry loop used by dashboard updates.
    concurrency:
      group: ${{ github.workflow }}-notify-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: read
    environment: protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Send Slack notifications
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OTELBOT_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_MAP_JSON: ${{ secrets.SLACK_USER_MAP_JSON }}
        run: |
          set -euo pipefail
          python3 .github/scripts/pull-request-dashboard/notify_slack.py \
            --state-branch "$DASHBOARD_STATE_BRANCH"

  publish-dashboard:
    needs: update-dashboard
    if: needs.update-dashboard.result == 'success'
    # The issue body is a single shared projection. Serialize publication,
    # then fetch the latest accepted state branch while holding this slot so
    # an older run cannot publish stale markdown after a newer state update
    # has landed.
    concurrency:
      group: ${{ github.workflow }}-publish-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Publish dashboard issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/pull-request-dashboard/publish_dashboard.py \
            --state-branch "$DASHBOARD_STATE_BRANCH"
