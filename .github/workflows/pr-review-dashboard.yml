name: PR dashboard

on:
  schedule:
    # hourly
    - cron: "0 * * * *"
  workflow_dispatch:
  pull_request_target:
    types:
      - assigned
      - closed
      - converted_to_draft
      - edited
      - labeled
      - opened
      - ready_for_review
      - reopened
      - review_request_removed
      - review_requested
      - synchronize
      - unassigned
      - unlabeled
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  issue_comment:
    types: [created, edited, deleted]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-dashboard:
    if: ${{ github.event_name != 'issue_comment' || github.event.issue.pull_request }}
    permissions:
      checks: read
      issues: write
      pull-requests: read
    environment: protected
    runs-on: ubuntu-latest
    env:
      TRIGGER_PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Install Copilot CLI
        run: |
          npm ci --prefix .github/scripts/copilot-cli
          # expose the locally-installed `copilot` binary to subsequent steps
          echo "$GITHUB_WORKSPACE/.github/scripts/copilot-cli/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Generate and update dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # needed for reading approver team membership (org:read)
          OTELBOT_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_MAP_JSON: ${{ secrets.SLACK_USER_MAP_JSON }}
        run: |
          set -euo pipefail

          if [[ -n "${TRIGGER_PR_NUMBER:-}" ]]; then
            python3 .github/scripts/pull-request-dashboard.py --pr-number "$TRIGGER_PR_NUMBER"
          else
            python3 .github/scripts/pull-request-dashboard.py
          fi
